<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" role="img" aria-label="Microsoft Fabric Data Agent Patterns">
  <defs>
    <linearGradient id="fabricGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#13A8B8"/>
      <stop offset="45%"  stop-color="#118DCC"/>
      <stop offset="80%"  stop-color="#5B5FC7"/>
      <stop offset="100%" stop-color="#7E5BCC"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#E8F4FB" stop-opacity="0.97"/>
    </linearGradient>
    <linearGradient id="agentRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#13A8B8"/>
      <stop offset="100%" stop-color="#7E5BCC"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Mark: Fabric-style ribbon weave + agent chat glyph -->
  <g transform="translate(20,20)" filter="url(#softShadow)">
    <rect x="0" y="0" width="120" height="120" rx="22" fill="url(#fabricGrad)"/>

    <g stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="6" fill="none" stroke-linecap="round">
      <path d="M 18 38 C 40 22, 80 22, 102 38"/>
      <path d="M 18 60 C 40 44, 80 76, 102 60"/>
      <path d="M 18 82 C 40 98, 80 98, 102 82"/>
    </g>
    <g stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M 30 24 L 30 96"/>
      <path d="M 60 18 L 60 102"/>
      <path d="M 90 24 L 90 96"/>
    </g>

    <g transform="translate(58,58)">
      <circle cx="22" cy="22" r="26" fill="url(#bubbleGrad)" stroke="url(#agentRing)" stroke-width="2.5"/>
      <circle cx="12" cy="22" r="3" fill="#5B5FC7"/>
      <circle cx="22" cy="22" r="3" fill="#118DCC"/>
      <circle cx="32" cy="22" r="3" fill="#13A8B8"/>
      <path d="M 8 38 L 2 48 L 14 42 Z" fill="url(#bubbleGrad)" stroke="url(#agentRing)" stroke-width="2.5" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g font-family="Segoe UI, Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif">
    <text x="170" y="68"  font-size="34" font-weight="700" fill="#0F172A" letter-spacing="-0.5">Microsoft Fabric</text>
    <text x="170" y="104" font-size="22" font-weight="600" fill="#5B5FC7" letter-spacing="0.2">Data Agent Patterns</text>
    <text x="170" y="132" font-size="13" font-weight="500" fill="#64748B" letter-spacing="0.6">GROUNDED · GATED · PRODUCTION-READY</text>
  </g>
</svg>
