<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 96" role="img" aria-label="Microsoft Fabric · Data Agent Patterns">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
  </defs>

  <!-- mark: stacked "fabric" tiles -->
  <g transform="translate(8,14)">
    <rect x="0"  y="0"  width="22" height="22" rx="4" fill="url(#g)" opacity="0.95"/>
    <rect x="26" y="0"  width="22" height="22" rx="4" fill="url(#g)" opacity="0.75"/>
    <rect x="52" y="0"  width="22" height="22" rx="4" fill="url(#g)" opacity="0.55"/>
    <rect x="0"  y="26" width="22" height="22" rx="4" fill="url(#g)" opacity="0.75"/>
    <rect x="26" y="26" width="22" height="22" rx="4" fill="url(#g)" opacity="0.95"/>
    <rect x="52" y="26" width="22" height="22" rx="4" fill="url(#g)" opacity="0.75"/>
    <rect x="0"  y="52" width="22" height="22" rx="4" fill="url(#g)" opacity="0.55"/>
    <rect x="26" y="52" width="22" height="22" rx="4" fill="url(#g)" opacity="0.75"/>
    <rect x="52" y="52" width="22" height="22" rx="4" fill="url(#g)" opacity="0.95"/>
  </g>

  <!-- wordmark -->
  <g font-family="Segoe UI, Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif" fill="#0F172A">
    <text x="100" y="42" font-size="26" font-weight="700">Microsoft Fabric</text>
    <text x="100" y="72" font-size="16" font-weight="500" fill="#475569">Data Agent Patterns</text>
  </g>
</svg>
