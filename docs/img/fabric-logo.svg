<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" role="img" aria-label="Microsoft Fabric Data Agent Patterns">
  <defs>
    <!-- Fabric brand-inspired teal -> cyan -> indigo -> violet -->
    <linearGradient id="ribbonA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0FD2C8"/>
      <stop offset="40%"  stop-color="#1AA7E8"/>
      <stop offset="100%" stop-color="#3B5BDB"/>
    </linearGradient>
    <linearGradient id="ribbonB" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3B5BDB"/>
      <stop offset="55%"  stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="ribbonHi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="ribbonShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fabric-style infinity ribbon mark -->
  <g transform="translate(20,18)" filter="url(#ribbonShadow)">
    <!-- ribbon A (lower loop, teal->blue) -->
    <path d="
      M 24 110
      C 24 60, 70 30, 110 60
      C 145 86, 145 86, 120 110
      C 95 134, 50 134, 24 110 Z"
      fill="url(#ribbonA)"/>
    <!-- ribbon B (upper loop, blue->violet) crossing in front -->
    <path d="
      M 140 30
      C 100 30, 70 60, 90 90
      C 110 120, 156 120, 144 78
      C 138 56, 124 40, 140 30 Z"
      fill="url(#ribbonB)"/>
    <!-- crossover band: short overlap stripe -->
    <path d="
      M 92 80
      C 100 70, 116 70, 124 80
      C 132 92, 124 100, 116 98
      C 104 96, 92 90, 92 80 Z"
      fill="url(#ribbonB)" opacity="0.85"/>
    <!-- highlight strip across both ribbons -->
    <path d="
      M 30 100
      C 60 70, 110 70, 150 60"
      fill="none" stroke="url(#ribbonHi)" stroke-width="6" stroke-linecap="round"/>
    <!-- subtle inner accent dot (anchors the mark) -->
    <circle cx="108" cy="88" r="4" fill="#FFFFFF" opacity="0.9"/>
  </g>

  <!-- Wordmark -->
  <g font-family="Segoe UI, Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif">
    <text x="210" y="78"  font-size="38" font-weight="700" fill="#0F172A" letter-spacing="-0.6">Microsoft Fabric</text>
    <text x="210" y="116" font-size="24" font-weight="600" fill="#3B5BDB" letter-spacing="0.2">Data Agent Patterns</text>
    <text x="210" y="146" font-size="13" font-weight="600" fill="#64748B" letter-spacing="1.4">GROUNDED &#x2022; GATED &#x2022; PRODUCTION-READY</text>
  </g>
</svg>
