<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-label="Microsoft Fabric Data Agent Patterns">
  <defs>
    <!-- Pale mint backdrop (matches Fabric brand background) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C8F0DA"/>
      <stop offset="100%" stop-color="#B6E8C6"/>
    </linearGradient>

    <!-- Top ribbon: bright mint -> cyan-green -->
    <linearGradient id="ribTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#C8F4DD"/>
      <stop offset="55%"  stop-color="#7CDCB1"/>
      <stop offset="100%" stop-color="#39B68F"/>
    </linearGradient>
    <!-- Middle ribbon: medium emerald -->
    <linearGradient id="ribMid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#5FC9A4"/>
      <stop offset="100%" stop-color="#1E8E76"/>
    </linearGradient>
    <!-- Bottom ribbon: deep emerald -->
    <linearGradient id="ribBot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#34A684"/>
      <stop offset="100%" stop-color="#0B5C4C"/>
    </linearGradient>
    <!-- Satin highlight -->
    <linearGradient id="satin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="dropSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.32"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Mint backdrop -->
  <rect x="0" y="0" width="1280" height="360" rx="20" fill="url(#bg)"/>

  <!-- =================== Fabric F-ribbon mark =================== -->
  <g transform="translate(120,70)" filter="url(#dropSoft)">
    <!-- Top horizontal ribbon (the upper arm of the F, folded) -->
    <path d="M 20 40
             C 30 18, 60 12, 95 18
             L 200 38
             C 220 42, 220 58, 200 68
             L 95 92
             C 60 100, 40 92, 30 76 Z"
          fill="url(#ribTop)"/>
    <!-- satin sheen on top -->
    <path d="M 30 38
             C 50 22, 90 22, 120 30
             L 190 48
             C 200 52, 200 58, 190 60
             L 120 72
             C 90 78, 50 70, 30 54 Z"
          fill="url(#satin)" opacity="0.7"/>

    <!-- Middle short horizontal ribbon (the crossbar of the F) -->
    <path d="M 18 110
             L 150 102
             C 168 102, 170 120, 152 126
             L 22 138
             C 6 138, 4 116, 18 110 Z"
          fill="url(#ribMid)"/>

    <!-- Vertical descending ribbon (the stem of the F) -->
    <path d="M 22 90
             L 70 90
             C 78 90, 82 96, 82 104
             L 82 220
             C 82 232, 70 240, 58 234
             L 18 214
             C 10 210, 8 200, 12 192
             L 12 110
             C 12 100, 16 92, 22 90 Z"
          fill="url(#ribBot)"/>

    <!-- side-fold shadow (gives the F dimension) -->
    <path d="M 22 90 L 38 88 L 38 222 L 22 214 Z" fill="#0B5C4C" opacity="0.22"/>

    <!-- soft highlight strip down the stem -->
    <path d="M 48 100 L 70 100 L 70 220 L 48 215 Z" fill="url(#satin)" opacity="0.55"/>
  </g>

  <!-- =================== Wordmark =================== -->
  <g font-family="Segoe UI, Segoe UI Variable, Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif">
    <text x="430" y="170" font-size="84" font-weight="400" fill="#1F3B33" letter-spacing="-1.2">
      Microsoft Fabric
    </text>
    <text x="432" y="232" font-size="42" font-weight="600" fill="#1F8F75" letter-spacing="-0.2">
      Data Agent Patterns
    </text>
    <text x="434" y="272" font-size="18" font-weight="600" fill="#2A8E76" letter-spacing="2.0">
      GROUNDED &#x2022; GATED &#x2022; PRODUCTION-READY
    </text>
  </g>
</svg>
